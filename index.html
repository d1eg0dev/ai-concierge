function handleQR(t){addMsg(t,false);clearQR();const lo=t.toLowerCase();
    // Funnel QR routing — SPECIFIC matches first, then generic
    if(lo.includes('ver suite')||lo.includes('view suite'))return showSuites();
    if(lo==='cotizar'||lo==='get a quote'||lo.includes('quote me')||lo==='cotizar estadía')return showStayForm();
    if(lo.includes('agregar experiencia')||lo.includes('add experience')||lo.includes('agregar otra')||lo.includes('add another')||lo==='experiencias'||lo==='experiences')return showExperiences();
    if(lo.includes('bote')||lo.includes('boat'))return showExpDetail('boat');
    if(lo.includes('picnic'))return showExpDetail('picnic');
    if(lo.includes('asado')||lo.includes('barbecue')||lo.includes('bbq'))return showExpDetail('bbq');
    if(lo.includes('cena')||lo.includes('dinner'))return showExpDetail('dinner');
    if(lo.includes('transporte')||lo.includes('transport')||lo.includes('traslado')||lo.includes('transfer')||lo.includes('ir a transporte')||lo.includes('go to transport'))return showTransportFlow();
    // Wedding quote BEFORE generic wedding
    if(lo.includes('cotizar boda')||lo.includes('wedding quote'))return showWeddingForm();
    if(lo==='bodas'||lo==='weddings')return showWeddings();
    if(lo.includes('contacto')||lo.includes('contact')||lo.includes('whatsapp'))return showContact();
    if(lo.includes('ver resumen')||lo.includes('view summary')||lo.includes('finalizar')||lo.includes('finalize'))return showFullSummary();
    if(lo.includes('skip')||lo.includes('no, gracias')||lo.includes('no thanks')||lo.includes('saltar'))return showFullSummary();
    if(lo.includes('nueva cotización')||lo.includes('new quote')||lo.includes('start over')){S.cart={stay:null,experiences:[],transport:null,email:'',name:''};return showSuites();}
    processMsg(t);
}

// ===================== MESSAGE ROUTER =====================
async function processMsg(msg){const lo=msg.toLowerCase();
    if(lo.includes('suite')&&(lo.includes('ver')||lo.includes('view')||lo.includes('show')||lo.includes('habitaci')))return showSuites();
    if((lo.includes('cotiz')||lo.includes('quote')||lo.includes('precio'))&&!lo.includes('boda')&&!lo.includes('wedding'))return showStayForm();
    if(lo.includes('experiencia')||lo.includes('experience')||lo.includes('picnic')||lo.includes('asado')||lo.includes('barbecue')||lo.includes('bote')||lo.includes('boat')||lo.includes('cena en la playa')||lo.includes('beach dinner'))return showExperiences();
    if(lo.includes('boda')||lo.includes('wedding'))return showWeddings();
    if(lo.includes('transporte')||lo.includes('transport')||lo.includes('traslado')||lo.includes('transfer')||lo.includes('aeropuerto')||lo.includes('airport')||lo.includes('llegar')||lo.includes('how to get')||lo.includes('ubicaci')||lo.includes('location'))return showTransportFlow();
    if(lo.includes('whatsapp')||lo.includes('contacto')||lo.includes('contact'))return showContact();

    // Smart conversation detection — guide users to the right flow
    if(lo.includes('reserv')||lo.includes('book')||lo.includes('quiero ir')||lo.includes('want to stay')||lo.includes('disponib')||lo.includes('availab')){
        addMsg(L()?'Con gusto te ayudo a reservar. Primero veamos nuestras opciones de alojamiento y después te preparo una cotización.':'I\'d love to help you book. Let\'s first look at our accommodation options and then I\'ll prepare a quote for you.',true,{qr:L()?['Ver Suites','Cotizar estadía']:['View Suites','Get a Quote']});return;
    }
    if(lo.includes('tortuga')){
        addMsg(L()?'La Suite Tortuga es espectacular — está al nivel de la playa con acceso directo a la arena. Precio: $6,600 MXN/noche. ¿Te gustaría cotizar tu estadía?':'Suite Tortuga is spectacular — beach level with direct sand access. Price: $6,600 MXN/night. Would you like to get a quote for your stay?',true,{qr:L()?['Sí, cotizar','Ver todas las suites']:['Yes, quote me','View all suites']});return;
    }
    if(lo.includes('puma')){
        addMsg(L()?'La Suite Puma es perfecta para familias — cama king, sala, cocina, 2 baños y alberca privada. Precio: $9,900 MXN/noche. ¿Cotizamos tu estadía?':'Suite Puma is perfect for families — king bed, living room, kitchen, 2 baths, and private pool. Price: $9,900 MXN/night. Shall we quote your stay?',true,{qr:L()?['Sí, cotizar','Ver todas las suites']:['Yes, quote me','View all suites']});return;
    }
    if(lo.includes('tauro')&&(lo.includes('suite')||lo.includes('habitaci')||lo.includes('room'))){
        addMsg(L()?'La Suite Tauro es la más grande de la casa — segundo piso con vistas panorámicas al océano y terraza privada. ¿Te gustaría cotizar?':'The Tauro Suite is the largest in the house — second floor with panoramic ocean views and private terrace. Would you like a quote?',true,{qr:L()?['Sí, cotizar','Ver todas las suites']:['Yes, quote me','View all suites']});return;
    }
    if(lo.includes('hola')||lo.includes('hello')||lo.includes('hi ')||lo==='hi'||lo.includes('buenos')||lo.includes('good')||lo.includes('hey')){
        addMsg(L()?'¡Hola! Bienvenido a Casa Tauro. ¿En qué puedo ayudarte hoy?':'Hello! Welcome to Casa Tauro. How can I help you today?',true,{qr:tx('opts')});return;
    }
    if(lo.includes('gracias')||lo.includes('thank')){
        addMsg(L()?'¡Con mucho gusto! ¿Hay algo más en lo que pueda ayudarte?':'My pleasure! Is there anything else I can help you with?',true,{qr:tx('opts')});return;
    }
    if(lo.includes('check in')||lo.includes('check out')||lo.includes('hora')||lo.includes('time')){
        addMsg(L()?'Check-in: 3:00 PM · Check-out: 12:00 PM. ¿Te gustaría ver nuestras suites o cotizar una estadía?':'Check-in: 3:00 PM · Check-out: 12:00 PM. Would you like to view our suites or get a quote?',true,{qr:tx('opts')});return;
    }
    if(lo.includes('meal')||lo.includes('comida')||lo.includes('aliment')||lo.includes('food')||lo.includes('desayun')||lo.includes('breakfast')){
        addMsg(L()?'Ofrecemos un plan de alimentos opcional: $2,500 MXN/adulto/día y $1,250 MXN/niños menores de 12. Incluye desayuno, comida y cena. Se puede agregar al cotizar tu estadía.':'We offer an optional meal plan: $2,500 MXN/adult/day and $1,250 MXN/children under 12. Includes breakfast, lunch, and dinner. You can add it when quoting your stay.',true,{qr:L()?['Cotizar estadía','Ver suites']:['Get a Quote','View Suites']});return;
    }
    if(lo.includes('cancel')){
        addMsg(L()?'Política de cancelación: Temporada baja — 30 días antes 100% reembolso, 29-10 días 50%, menos de 10 días no reembolsable. Temporada alta — 60 días antes 100%, 59-30 días 50%, menos de 30 días no reembolsable.':'Cancellation policy: Low season — 30 days before 100% refund, 29-10 days 50%, less than 10 days non-refundable. High season — 60 days before 100%, 59-30 days 50%, less than 30 days non-refundable.',true,{qr:tx('opts')});return;
    }
    if(lo.includes('pet')||lo.includes('mascota')||lo.includes('perro')||lo.includes('dog')){
        addMsg(L()?'Por el momento no aceptamos mascotas en la propiedad. ¿Puedo ayudarte con algo más?':'At this time we do not accept pets on the property. Can I help you with anything else?',true,{qr:tx('opts')});return;
    }
    if(lo.includes('wifi')||lo.includes('internet')){
        addMsg(L()?'Sí, todas las suites cuentan con WiFi de alta velocidad incluido, además de bocina Bose, minibar, Nespresso, y más.':'Yes, all suites include high-speed WiFi, plus Bose speaker, minibar, Nespresso, and more.',true,{qr:tx('opts')});return;
    }

    // AI fallback — only if no pattern matched
    showTyping();
    try{const r=await callAPI(msg);hideTyping();addMsg(r,true,{qr:tx('opts')});}catch(e){hideTyping();
        // Friendly fallback instead of error
        addMsg(L()?'Puedo ayudarte mejor con los botones de abajo. ¿Qué te gustaría hacer?':'I can help you best with the options below. What would you like to do?',true,{qr:tx('opts')});
    }
}

async function callAPI(u){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':C.KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:`You are the booking assistant for Casa Tauro (casatauro.com), an exclusive luxury hotel on the Pacific coast of Jalisco, Mexico. Speak ${L()?'Spanish':'English'}. Be concise (2-3 sentences), warm, sophisticated. No emojis. NEVER mention "Careyes" or "Costa Careyes" — always say "the Jalisco coast" or "the Pacific coast". When guests ask about booking or reservations, guide them to use the quote button. Knowledge:\n${KB}`,messages:[...S.hist,{role:'user',content:u}]})});const d=await r.json();if(d.content?.[0]){const t=d.content[0].text;S.hist.push({role:'user',content:u},{role:'assistant',content:t});if(S.hist.length>16)S.hist=S.hist.slice(-16);return t;}throw new Error('API error');}

window.saveStay=function(){
    const ci=$('sCI').value,n=+$('sN').value,g=+$('sG').value,p=$('sP').value,m=+$('sM').value;
    if(!ci||!n||!g){alert(L()?'Completa todos los campos':'Fill all fields');return;}

    const hi=(mo===12&&da>=15)||(mo===1&&da<=10)||(mo===3&&da>=20)||(mo===4&&da<=20);
    const pr={full:hi?82500:52000,casa:hi?52000:34650,casita:hi?27000:17350};

    if(hi&&p==='full'&&n<7){alert(L()?'En temporada alta, la propiedad completa requiere mínimo 7 noches.':'In high season, the full property requires a minimum of 7 nights.');return;}
    const room=pr[p]*n,meal=m?g*2500*n:0;
    const names={full:L()?'Propiedad Completa':'Full Property',casa:'Casa Tauro',casita:'Casita Palmar'};
    S.cart.stay={checkin:ci,nights:n,guests:g,property:p,propName:names[p],meals:m,roomTotal:room,mealTotal:meal,high:hi};
    addMsg(`${L()?'Alojamiento guardado':'Accommodation saved'}: <strong>${names[p]}</strong>, ${n} ${L()?'noches':'nights'}, ${g} ${L()?'huéspedes':'guests'}. ${L()?'Subtotal':'Subtotal'}: ${fmt(room+meal)}`,true,{qr:L()?['Agregar experiencias','Saltar a transporte','Ver resumen']:['Add experiences','Skip to transport','View summary']});

window.sendQuote=function(){
    const l=L();const name=$('fName')?.value||'',email=$('fEmail')?.value||'';
    if(!name||!email){alert(l?'Nombre y email requeridos':'Name and email required');return;}
    S.cart.name=name;S.cart.email=email;
    const c=S.cart,st=c.stay;
    let grand=st.roomTotal+st.mealTotal;c.experiences.forEach(e=>grand+=e.total);if(c.transport)grand+=c.transport.price;
    const tax=grand*0.16,total=grand+tax;
    const co=new Date(st.checkin);co.setDate(co.getDate()+st.nights);
    const fd=d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

    let txt=`CASA TAURO - QUOTE\nGuest: ${name}\nEmail: ${email}\n\n`;
    txt+=`STAY: ${st.propName}\n${fd(st.checkin)} → ${fd(co)} (${st.nights} nights)\n${st.guests} guests · ${st.high?'High':'Low'} Season\nAccommodation: ${fmt(st.roomTotal)}\n`;
    if(st.meals)txt+=`Meals: ${fmt(st.mealTotal)}\n`;
    if(c.experiences.length){txt+=`\nEXPERIENCES:\n`;c.experiences.forEach(e=>{txt+=`- ${e.name}: ${fmt(e.total)}\n`;});}
    if(c.transport)txt+=`\nTRANSPORT: ${c.transport.dest} (${c.transport.vehicle}) - ${fmt(c.transport.price)}\n`;
    txt+=`\nSubtotal: ${fmt(grand)}\nIVA (16%): ${fmt(tax)}\nTOTAL: ${fmt(total)}`;
    txt+=`\n\nPolicies: 50% deposit to confirm. Full payment 7 days before arrival.\nCancellation: Low season 30 days (100%), 29-10 days (50%), <10 non-refundable.\nHigh season: 60 days (100%), 59-30 days (50%), <30 non-refundable.\n\nQuote generated by casatauro.com AI Concierge · Developed by wdstudio.agency`;

    // Send to Google Apps Script (Sheets + Email)
    const payload = {
        type: 'stay', name, email, lang: S.lang,
        checkin: fd(st.checkin), checkout: fd(co),
        nights: st.nights, guests: st.guests,
        property: st.propName, season: st.high?'High Season':'Low Season',
        experiences: c.experiences.map(e=>e.name+' '+fmt(e.total)).join(', ') || '',
        transport: c.transport ? c.transport.dest+' '+fmt(c.transport.price) : '',
        subtotal: fmt(grand), iva: fmt(tax), total: fmt(total)
    };
    
    if(C.APPS_SCRIPT && !C.APPS_SCRIPT.includes('PASTE_YOUR')){
        fetch(C.APPS_SCRIPT, { method:'POST', mode:'no-cors', body:JSON.stringify(payload) }).catch(()=>{});
        addMsg(l?'Cotización enviada automáticamente a nuestro equipo y a tu email. Compártela también por WhatsApp para una respuesta más rápida.':'Quote automatically sent to our team and to your email. Share via WhatsApp for a faster response.',true);
    } else {
        addMsg(l?'Cotización procesada. Compártela por WhatsApp para confirmar con nuestro equipo.':'Quote processed. Share via WhatsApp to confirm with our team.',true);
    }

    const waMsg=encodeURIComponent(txt);
    const waLink=`https://api.whatsapp.com/send?phone=${C.WA.replace('+','')}&text=${waMsg}`;
    addCard(`<div style="margin-top:8px"><a href="${waLink}" target="_blank" class="qab qaw" style="display:flex;width:100%;border-radius:var(--r-sm);padding:14px;text-decoration:none;justify-content:center;font-size:14px">${l?'Enviar por WhatsApp':'Send via WhatsApp'}</a></div>`);
    setTimeout(()=>{addMsg(l?'Nuestro equipo revisará disponibilidad y te contactará pronto. ¡Gracias por elegir Casa Tauro!':'Our team will check availability and contact you soon. Thank you for choosing Casa Tauro!',true,{qr:l?['Nueva cotización','Bodas','Contacto']:['New quote','Weddings','Contact']});},800);
};

    const fd=x=>new Date(x).toLocaleDateString(l?'es-MX':'en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

    // Show detailed estimate card
    addCard(`<div class="qr2"><div class="qr2h"><h4>${l?'Cotización de Boda':'Wedding Quote'}</h4><span class="st">${g} ${l?'invitados':'guests'}</span></div><div class="qr2b">
        <div style="font-size:12px;color:var(--stone);margin-bottom:12px">${fd(d)} · ${bn}</div>
        <div class="ql"><span>${l?'Renta de playa':'Beach rental'} (${g<=100?'≤100':'101–350'} ${l?'personas':'guests'})</span><span>${fmt(bp)}</span></div>
        <div class="ql"><span>${l?'Propiedad completa':'Full property'} (12 ${l?'huésp.':'guests'}) × ${n} ${l?'noches':'nights'}</span><span>${fmt(pp)}</span></div>
        <div class="ql"><span>${l?'Depósito de seguridad':'Security deposit'} (${l?'reembolsable':'refundable'})</span><span>${fmt(deposit)}</span></div>
        <div class="ql"><span>${l?'TOTAL VENUE':'TOTAL VENUE'}</span><span>${fmt(tot)}</span></div>
        <div class="qn" style="line-height:1.6">
            <strong>${l?'Importante':'Important'}:</strong><br>
            · ${l?'Casa Tauro provee exclusivamente el venue':'Casa Tauro exclusively provides the venue'}<br>
            · ${l?'Tú contratas: catering, decoración, entretenimiento, seguridad, valet, baños portátiles, generador eléctrico, recolección de basura':'You hire: catering, decoration, entertainment, security, valet, portable toilets, electricity generator, garbage disposal'}<br>
            · ${l?'Áreas comunes solo para los 12 huéspedes de la casa':'Common areas only for the 12 house guests'}<br>
            · ${l?'Depósito de seguridad 100% reembolsable si no hay daños':'Security deposit 100% refundable if no damages'}<br>
            · ${l?'Todos los precios + IVA':'All prices + VAT'}<br>
            · ${l?'Pago: 50% depósito para confirmar, pago total 15 días antes':'Payment: 50% deposit to confirm, full payment 15 days before'}<br>
            · ${l?'Cancelación: 45 días antes 100%, 44-30 días 50%, <30 días no reembolsable':'Cancellation: 45 days before 100%, 44-30 days 50%, <30 days non-refundable'}
        </div>
    </div></div>`);

    setTimeout(()=>{
        addMsg(l?'Para invitados adicionales que necesiten hospedaje, recomendamos estos hoteles cercanos:\n\n<strong>Hotel Club Careyes y Residences</strong>\nTayde Ramirez · +52 (315) 351 0322\n\n<strong>Casita de las Flores & Careyes Private Villas</strong>\nMarco Lorelli · +52 1 (322) 140 1809':'For additional guests needing accommodation, we recommend these nearby hotels:\n\n<strong>Hotel Club Careyes y Residences</strong>\nTayde Ramirez · +52 (315) 351 0322\n\n<strong>Casita de las Flores & Careyes Private Villas</strong>\nMarco Lorelli · +52 1 (322) 140 1809',true);
    },500);

    // Build inquiry text
    let txt=`WEDDING INQUIRY - CASA TAURO\n${'='.repeat(40)}\n\n`;
    txt+=`CONTACT:\nName: ${nm}\nEmail: ${em}\n${ph?'Phone: '+ph+'\n':''}`;
    txt+=`\nEVENT:\nDate: ${fd(d)}\nGuests: ${g}\nNights: ${n}\nBeach: ${bn}\n`;
    txt+=`\nVision/Notes: ${no||'None provided'}\n`;
    txt+=`\nVENUE QUOTE:\nBeach rental: ${fmt(bp)}\nProperty (${n} nights × $82,500): ${fmt(pp)}\nSecurity deposit (refundable): ${fmt(deposit)}\nTOTAL VENUE: ${fmt(tot)}\n`;
    txt+=`\nNote: Venue only. Client arranges catering, decoration, entertainment, security, toilets, generator, garbage, ambulance.\n`;
    txt+=`Cancellation: 45d=100%, 44-30d=50%, <30d=non-refundable.\nPayment: 50% deposit + full 15 days before.\n`;
    txt+=`\n---\nCasa Tauro AI Concierge · casatauro.com\nDeveloped by wdstudio.agency`;

    // Send to backend
    if(C.APPS_SCRIPT && !C.APPS_SCRIPT.includes('PASTE_YOUR')){
        fetch(C.APPS_SCRIPT, { method:'POST', mode:'no-cors', body:JSON.stringify({
            type:'wedding', name:nm, email:em, phone:ph, lang:S.lang,
            checkin:fd(d), nights:n, guests:g, property:'Full Property (Wedding)',
            notes: bn+' | '+(no||''), subtotal:fmt(bp+pp), iva:'', total:fmt(tot), season:'Wedding'
        })}).catch(()=>{});
    }

    // WhatsApp
    const waLink=`https://api.whatsapp.com/send?phone=${C.WA.replace('+','')}&text=${encodeURIComponent(txt)}`;

    setTimeout(()=>{
        addMsg(l?'Tu cotización de boda está lista. Compártela con nuestro equipo para iniciar el proceso.':'Your wedding quote is ready. Share it with our team to start the process.',true);
        addCard(`<div style="margin-top:8px"><a href="${waLink}" target="_blank" class="qab qaw" style="display:flex;width:100%;border-radius:var(--r-sm);padding:14px;text-decoration:none;justify-content:center;font-size:14px">${l?'Enviar por WhatsApp':'Send via WhatsApp'}</a></div>`);
    },1000);

    setTimeout(()=>{
        addMsg(l?'Nuestro equipo de bodas te contactará en 24-48 horas con los siguientes pasos y recomendaciones de proveedores en la zona. ¡Tu boda soñada en Careyes está a un paso!':'Our wedding team will contact you within 24-48 hours with next steps and vendor recommendations in the area. Your dream Careyes wedding is one step away!',true,{qr:l?['Ver suites','Contacto','Nueva cotización']:['View suites','Contact','New quote']});
    },1600);
};
